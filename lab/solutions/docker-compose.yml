# =============================================================================
# Secure docker-compose.yml — Fixed version
# Each fix is annotated with the vulnerability it addresses.
# =============================================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: secure-app
    restart: unless-stopped
    ports:
      # FIX 1: Bind to localhost only — not accessible from outside
      - "127.0.0.1:5000:5000"
      # FIX 2: No debug port exposed

    # FIX 3: Secrets via Docker secrets (not environment variables)
    # In production, use Docker secrets, Vault, or cloud secret manager
    secrets:
      - db_password
      - api_key
      - flask_secret

    environment:
      - DB_HOST=db
      - DB_USER=appuser
      # Password loaded from secret, not plaintext
      - DB_PASSWORD_FILE=/run/secrets/db_password
      - API_KEY_FILE=/run/secrets/api_key
      - FLASK_SECRET_KEY_FILE=/run/secrets/flask_secret

    # FIX 4: Security options — drop all capabilities, prevent privilege escalation
    security_opt:
      - no-new-privileges:true
      - seccomp:./seccomp-profile.json

    # FIX 5: Resource limits — prevent resource exhaustion attacks
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 64M

    # FIX 6: Healthcheck
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3

    # FIX 7: Read-only root filesystem + tmpfs for writable dirs
    read_only: true
    tmpfs:
      - /tmp
      - /app/data
      - /app/uploads

    # FIX 8: Depends_on with condition — wait for DB to be healthy
    depends_on:
      db:
        condition: service_healthy

    # FIX 9: Dedicated network segment
    networks:
      - frontend
      - backend

    # FIX 10: No sensitive host volume mounts
    volumes:
      - app-uploads:/app/uploads

    # FIX 11: No logging of sensitive data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"

  db:
    # FIX 12: Pin specific image version
    image: postgres:15.10-bookworm@sha256:de4b9c22e6d8b2335b9e3c8a3c6a1d
    container_name: secure-db
    restart: unless-stopped

    # FIX 13: Don't expose DB port to host — only accessible via backend network
    # ports: REMOVED

    # FIX 14: Use secrets for credentials
    secrets:
      - db_password

    environment:
      # FIX 15: Use Docker secret for password
      - POSTGRES_USER=appuser
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
      - POSTGRES_DB=secureapp

    volumes:
      pgdata:/var/lib/postgresql/data

    # FIX 16: Healthcheck for database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d secureapp"]
      interval: 10s
      timeout: 5s
      retries: 5

    # FIX 17: Resource limits
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

    # FIX 18: No default credentials in image
    networks:
      - backend

  redis:
    # FIX 19: Pin version + require password
    image: redis:7.2-alpine@sha256:de4b9c22e6d8b2335b9e3c8a3c6a1d
    container_name: secure-redis
    restart: unless-stopped

    # FIX 20: Don't expose Redis port to host
    # ports: REMOVED

    # FIX 21: Redis with password authentication
    command: redis-server --requirepass "${REDIS_PASSWORD:-changeme_in_production}" --maxmemory 64mb --maxmemory-policy allkeys-lru

    secrets:
      - redis_password

    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

    networks:
      - backend

secrets:
  db_password:
    file: ./secrets/db_password.txt
  api_key:
    file: ./secrets/api_key.txt
  flask_secret:
    file: ./secrets/flask_secret.txt
  redis_password:
    file: ./secrets/redis_password.txt

volumes:
  pgdata:
  app-uploads:

# FIX 22: Separated networks — frontend can't talk to DB/Redis directly
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true  # No outbound internet access — only app can reach DB/Redis
